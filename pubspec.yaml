name: postback_flutter
description: Flutter Postback attribution SDK.
version: 1.0.0
homepage: https://postback.sh
repository: https://github.com/getpostback/postback-flutter
issue_tracker: https://github.com/getpostback/postback-flutter/issues
documentation: https://pub.dev/packages/postback_flutter

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: sh.postback.flutter
        pluginClass: PostbackFlutterPlugin
      ios:
        pluginClass: PostbackFlutterPlugin
